<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRBB 鐵人拔巴運動團</title>
    <!-- 引入所有必要的庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK (使用 Compat 版本以利單檔案運作) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        /* 針對行事曆內活動名稱加大至 14px */
        .calendar-activity-label { font-size: 14px !important; line-height: 1.4; }
        body { font-family: 'Noto Sans TC', sans-serif; }
        .nav-active { color: #ea580c !important; font-weight: 900; position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: #ea580c; }
    </style>
</head>
<body class="bg-white text-gray-900 selection:bg-orange-100 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCtPA3SayZFgInZw3qE-Cw6bdl56aIh1SM",
            authDomain: "trbb226113515.firebaseapp.com",
            projectId: "trbb226113515",
            storageBucket: "trbb226113515.firebasestorage.app",
            messagingSenderId: "1099369019824",
            appId: "1:1099369019824:web:6df5ff1e1916cd24447e75",
            measurementId: "G-PL7NT3TLLY"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        const appId = 'c_c86aa89f15436485_TRBB_Website.jsx-282';
        const LOGO_URL = "https://cdn.imgchest.com/files/34d6ad0acbce.png";
        const PLACEHOLDER_IMAGE = "https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&q=80&w=800";
        const GLOBAL_REG_LINK = "https://docs.google.com/forms/d/e/1FAIpQLSedQG9WlmYDTndwrbr66v-pj9sud3Gjjkdn0y764uXsr5dJog/formResponse";

        // --- Lucide 圖標封裝 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('首頁');
            const [adminView, setAdminView] = useState('myEvents'); 
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [isGuestModalOpen, setIsGuestModalOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            // Firestore 資料狀態
            const [events, setEvents] = useState([]);
            const [registrations, setRegistrations] = useState([]);
            const [dbMembers, setDbMembers] = useState([]);
            const [mallProducts, setMallProducts] = useState([]);
            const [groupRegEvents, setGroupRegEvents] = useState([]);
            
            const [loginForm, setLoginForm] = useState({ id: '', birthday: '' });
            const [loginError, setLoginError] = useState('');
            const [guestName, setGuestName] = useState('');
            const [pendingEvent, setPendingEvent] = useState(null);

            const navItems = [
                { name: '首頁', icon: 'heart' },
                { name: '生存戰區', icon: 'target' },
                { name: '活動行事曆', icon: 'calendar' },
                { name: '網頁團報', icon: 'users' },
                { name: '購物商城', icon: 'shopping-cart' },
                { name: '2.0會籍專區', icon: 'shield-check' },
            ];

            const handleNavClick = (name) => {
                setActiveTab(name);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // 1. 初始化 Auth
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((fbUser) => {
                    if (!fbUser) auth.signInAnonymously();
                });
                const savedUser = localStorage.getItem('trbb_user');
                if (savedUser) {
                    try { setUser(JSON.parse(savedUser)); } catch(e) { setUser(null); }
                }
                return () => unsubscribe();
            }, []);

            // 2. 監聽捲動
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // 3. 監聽鍵盤 ESC
            useEffect(() => {
                const handleEsc = (e) => {
                    if (e.key === 'Escape') {
                        setIsLoginModalOpen(false);
                        setIsGuestModalOpen(false);
                    }
                };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);

            // 4. 資料連動監聽
            useEffect(() => {
                const dataPath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const unsub1 = dataPath.collection('events').onSnapshot(s => setEvents(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsub2 = dataPath.collection('registrations').onSnapshot(s => setRegistrations(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsub3 = dataPath.collection('members').onSnapshot(s => setDbMembers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsub4 = dataPath.collection('mall').onSnapshot(s => setMallProducts(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsub5 = dataPath.collection('group_registrations').onSnapshot(s => setGroupRegEvents(s.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsub1(); unsub2(); unsub3(); unsub4(); unsub5(); };
            }, []);

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                setLoginError('');
                const lid = loginForm.id.trim().toLowerCase();
                const lbday = loginForm.birthday.trim();
                if (!lid || !lbday) return setLoginError('請輸入內容');

                const member = dbMembers.find(m => m.id === lid && m.birthday === lbday);
                if (member) {
                    const u = { uid: lid, displayName: member.name || lid, role: member.role || 'user', photoURL: `https://api.dicebear.com/7.x/${member.role === 'admin' ? 'bottts' : 'avataaars'}/svg?seed=${lid}` };
                    setUser(u); localStorage.setItem('trbb_user', JSON.stringify(u));
                    setIsLoginModalOpen(false);
                } else if ((lid === 'admin' && lbday === 'admin') || (lid === '252' && lbday === '19990624')) {
                    const u = { uid: lid, displayName: lid === 'admin' ? '系統管理員' : '小編', role: 'admin', photoURL: `https://api.dicebear.com/7.x/bottts/svg?seed=${lid}` };
                    setUser(u); localStorage.setItem('trbb_user', JSON.stringify(u));
                    setIsLoginModalOpen(false);
                } else {
                    setLoginError('帳號不存在或密碼錯誤');
                }
            };

            const handleLogout = () => { setUser(null); localStorage.removeItem('trbb_user'); setActiveTab('首頁'); setAdminView('myEvents'); };

            const isDarkText = scrolled || activeTab !== '首頁';

            // --- 子組件: 行事曆 ---
            const CalendarView = () => {
                const [currentDate, setCurrentDate] = useState(new Date(2026, 3, 1));
                const [selectedEvent, setSelectedEvent] = useState(null);
                const dInM = (y, m) => new Date(y, m + 1, 0).getDate();
                const fDay = (y, m) => new Date(y, m, 1).getDay();

                useEffect(() => {
                    const hEsc = (e) => { if (e.key === 'Escape') setSelectedEvent(null); };
                    window.addEventListener('keydown', hEsc);
                    return () => window.removeEventListener('keydown', hEsc);
                }, []);

                const y = currentDate.getFullYear(); const m = currentDate.getMonth(); const days = [];
                for (let i = 0; i < fDay(y, m); i++) days.push(<div key={`e-${i}`} className="h-32 border-b border-r border-gray-50 bg-gray-50/20"></div>);
                for (let d = 1; d <= dInM(y, m); d++) {
                    const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayEvents = events.filter(e => e.date === dStr);
                    days.push(
                        <div key={d} className="h-32 border-b border-r border-gray-50 p-2 hover:bg-orange-50/20 transition-colors text-gray-900 group relative">
                            <span className="text-xl font-black text-gray-300 p-1 group-hover:text-orange-500 transition-colors">{d}</span>
                            <div className="mt-1 space-y-1 overflow-y-auto max-h-[85px] scrollbar-hide">
                                {dayEvents.map(ev => (
                                    <div key={ev.id} onClick={() => setSelectedEvent(ev)} className="calendar-activity-label p-2 rounded border-l-4 truncate cursor-pointer font-black shadow-sm transition-all hover:scale-[1.02]" style={{ backgroundColor: ev.type === '賽事' ? '#fef2f2' : ev.type === '團練' ? '#eff6ff' : '#fff7ed', color: ev.type === '賽事' ? '#b91c1c' : ev.type === '團練' ? '#1d4ed8' : '#c2410c', borderColor: ev.type === '賽事' ? '#ef4444' : ev.type === '團練' ? '#3b82f6' : '#f97316' }}>{ev.title}</div>
                                ))}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="max-w-7xl mx-auto px-4 pt-40 pb-20 animate-fadeIn text-gray-900">
                        <div className="mb-10 text-gray-900"><h1 className="text-5xl font-black tracking-tight">活動行事曆</h1><p className="text-gray-400 text-sm mt-3 font-medium">點擊標籤報名，可按 ESC 鍵關閉視窗</p></div>
                        <div className="flex items-center justify-between mb-8 bg-white p-4 rounded-2xl border shadow-sm">
                            <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth() - 1)))} className="p-3 hover:bg-gray-100 rounded-full text-gray-900"><Icon name="chevron-left" size={28}/></button>
                            <h2 className="text-3xl font-black text-gray-900 tracking-tight">{currentDate.getFullYear()}年 {currentDate.getMonth() + 1}月</h2>
                            <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth() + 1)))} className="p-3 hover:bg-gray-100 rounded-full text-gray-900"><Icon name="chevron-right" size={28}/></button>
                        </div>
                        <div className="bg-white rounded-[2.5rem] border border-gray-100 shadow-2xl overflow-hidden grid grid-cols-7 text-gray-900">
                            {["日", "一", "二", "三", "四", "五", "六"].map(d => (<div key={d} className="py-5 text-center text-sm font-black text-gray-400 bg-gray-50/50 border-b">{d}</div>))}
                            {days}
                        </div>
                        {selectedEvent && (
                            <div className="fixed inset-0 z-[500] flex items-center justify-center p-4 bg-black/70 backdrop-blur-md animate-fadeIn">
                                <div className="bg-white w-full max-w-sm rounded-[3rem] overflow-hidden shadow-2xl relative text-gray-900">
                                    <div className="relative h-48 bg-gray-900 text-white"><img src={selectedEvent.image || PLACEHOLDER_IMAGE} className="w-full h-full object-cover opacity-50" /><button onClick={() => setSelectedEvent(null)} className="absolute top-6 right-6 bg-white/20 p-2 rounded-full text-white hover:bg-white/40"><Icon name="x" size={20}/></button><div className="absolute bottom-6 left-8"><h3 className="text-3xl font-black drop-shadow-md">{selectedEvent.title}</h3></div></div>
                                    <div className="p-10 space-y-6">
                                        <div className="space-y-4 text-sm text-gray-600">
                                            <div className="flex items-center gap-2 font-bold text-gray-800"><Icon name="calendar-days" className="text-orange-500" /> {selectedEvent.date} {selectedEvent.time}</div>
                                            <div className="flex items-center gap-2 font-bold text-gray-800"><Icon name="map-pin" className="text-orange-500" /> {selectedEvent.location}</div>
                                            <div className="flex items-center gap-2 font-black text-gray-900 bg-orange-50 p-2 rounded-xl border border-orange-100"><Icon name="users" className="text-orange-500" /> 目前已有 {registrations.filter(r => r.eventId === selectedEvent.id).length} 位報名</div>
                                        </div>
                                        <div className="space-y-3 pt-2">
                                            {registrations.some(r => r.eventId === selectedEvent.id && r.userId === user?.uid) ? (
                                                <button onClick={() => { db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations').doc(registrations.find(r=>r.eventId===selectedEvent.id && r.userId===user.uid).id).delete(); setSelectedEvent(null); }} className="w-full py-4 rounded-2xl font-black bg-gray-100 text-red-500">取消報名</button>
                                            ) : (
                                                <button onClick={() => { if(!user) { setPendingEvent(selectedEvent); setIsGuestModalOpen(true); } else { db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations').add({eventId: selectedEvent.id, userId: user.uid, userName: user.displayName, eventTitle: selectedEvent.title, joinedAt: firebase.firestore.Timestamp.now()}); } setSelectedEvent(null); }} className="w-full py-5 rounded-2xl font-black bg-orange-600 text-white shadow-xl text-xl">我要 +1 參加</button>
                                            )}
                                            {selectedEvent.officialUrl && <a href={selectedEvent.officialUrl} target="_blank" rel="noopener noreferrer" className="w-full py-3 rounded-2xl font-black border-2 border-gray-100 text-center text-gray-400 hover:text-orange-600 transition-all text-sm flex items-center justify-center gap-2 font-bold"><Icon name="globe" size={16}/>前往活動官網</a>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- 子組件: 生存戰區 ---
            const SurvivalZone = () => (
                <div className="max-w-7xl mx-auto px-4 pt-40 pb-20 animate-fadeIn text-gray-900">
                    <div className="mb-12 flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div><div className="flex items-center gap-4 mb-3"><span className="bg-orange-600 text-white px-4 py-1 rounded-full text-xs font-black animate-pulse uppercase tracking-wider">4/11 報名截止 🔥</span><h2 className="text-6xl font-black tracking-tighter text-gray-900">2026 TRBB 生存戰</h2></div><p className="text-gray-500 italic font-medium italic">規律運動 × 團隊陪伴 × 一起撐下去</p></div>
                        <a href="https://docs.google.com/forms/d/e/1FAIpQLScgC8OQZEX37VDPlJ1rtSj5rq7cZQASKII-QhN36dB1PfTHyw/viewform" target="_blank" rel="noopener noreferrer" className="bg-black text-white px-10 py-5 rounded-[2rem] font-black text-xl hover:bg-orange-600 transition-all flex items-center gap-2 shadow-2xl text-center"><Icon name="external-link" size={24}/> 前往生存報名</a>
                    </div>
                    <div className="grid lg:grid-cols-3 gap-10 text-gray-900">
                        <div className="lg:col-span-2 space-y-10">
                            <div className="bg-gray-900 rounded-[3rem] p-12 text-white shadow-2xl relative overflow-hidden group"><h3 className="text-3xl font-black mb-10 flex items-center gap-4 tracking-tight"><Icon name="clock" className="text-orange-500" /> 年度生存節奏</h3><div className="grid grid-cols-1 md:grid-cols-2 gap-5"><div className="p-6 bg-white/5 rounded-3xl border border-white/10 flex items-center justify-between"><div><div className="text-gray-400 text-xs mb-1 font-bold">第一期 (第16期)</div><div className="text-xl font-black text-white">1/12 - 3/22</div></div><Icon name="check-circle-2" className="text-green-500" size={28}/></div><div className="p-6 bg-orange-600/20 rounded-3xl border border-orange-500/30 flex items-center justify-between"><div><div className="text-orange-200 text-xs mb-1 font-bold">第二期 (第17期)</div><div className="text-xl font-black text-orange-400">4/13 - 6/21</div></div><span className="bg-orange-500 text-white text-[10px] px-3 py-1 rounded-full font-black animate-pulse">報名中</span></div></div></div>
                            <div className="bg-white rounded-[3rem] border border-gray-100 p-12 shadow-sm text-gray-900"><h3 className="text-3xl font-black mb-10 flex items-center gap-4 tracking-tight text-gray-900"><Icon name="zap" className="text-orange-600" /> 生存規則</h3><div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-center text-gray-900"><div className="bg-gray-50 p-10 rounded-[2.5rem] border border-transparent hover:border-orange-100 transition-all text-gray-900 text-gray-900"><div className="text-5xl mb-6">🏊</div><div className="font-black text-lg">游泳 750m</div></div><div className="bg-gray-50 p-10 rounded-[2.5rem] border border-transparent hover:border-orange-100 transition-all text-gray-900 text-gray-900"><div className="text-5xl mb-6">🚴</div><div className="font-black text-lg">騎車 20km</div></div><div className="bg-gray-50 p-10 rounded-[2.5rem] border border-transparent hover:border-orange-100 transition-all text-gray-900 text-gray-900"><div className="text-5xl mb-6">🏃</div><div className="font-black text-lg text-gray-900">跑 5km</div></div></div></div>
                        </div>
                        <div className="space-y-8"><div className="bg-white rounded-[3rem] p-10 border shadow-sm flex flex-col items-center"><h3 className="text-2xl font-black mb-8 flex items-center gap-3 text-gray-800"><Icon name="circle-dollar-sign" className="text-green-600" /> 生存費用</h3><div className="w-full space-y-5 text-gray-900"><div className="flex justify-between items-center py-4 border-b border-gray-50 text-gray-900 text-gray-900 text-gray-900"><span className="font-bold text-gray-600">TRBB 2.0 會員</span><span className="text-2xl font-black text-orange-600">$1000</span></div><div className="flex justify-between items-center py-4 border-b border-gray-50 text-gray-900 text-gray-900 text-gray-900 text-gray-900"><span className="font-bold text-gray-600">非 TRBB 2.0</span><span className="text-2xl font-black text-orange-600">$2500</span></div><div className="bg-green-50 p-6 rounded-3xl text-xs text-green-700 font-black border border-green-100">生存戰歷屆團友特惠 $1000</div></div></div></div>
                    </div>
                </div>
            );

            // --- 子組件: 管理控制台 ---
            const AdminConsole = () => {
                const myRegs = registrations.filter(r => r.userId === user?.uid);
                
                const ModuleEditor = ({ col, fields, icon, title }) => {
                    const [f, setF] = useState({});
                    const [eid, setEid] = useState(null);
                    const items = col === 'events' ? events : col === 'mall' ? mallProducts : col === 'members' ? dbMembers : groupRegEvents;

                    const save = async () => {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col);
                        if(col === 'members') {
                            if(!f.id) return;
                            await ref.doc(f.id.toLowerCase()).set({...f, updatedAt: firebase.firestore.Timestamp.now()});
                        } else {
                            if(eid) await ref.doc(eid).update(f);
                            else await ref.add({...f, createdAt: firebase.firestore.Timestamp.now()});
                        }
                        setEid(null); setF({});
                    };

                    return (
                        <div className="grid md:grid-cols-2 gap-10">
                            <div className={`space-y-4 p-8 rounded-[3rem] ${col === 'members' ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-900'}`}>
                                <h5 className="font-black mb-4 flex items-center gap-2 text-gray-900"><Icon name={icon} /> 編輯{title}</h5>
                                {fields.map(field => (
                                    <input key={field.id} type="text" placeholder={field.label} value={f[field.id] || ''} onChange={e=>setF({...f, [field.id]:e.target.value})} className={`w-full px-5 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-orange-500 text-gray-900 ${col === 'members' ? 'bg-white/10 border-none' : 'bg-white'}`} />
                                ))}
                                <button onClick={save} className="w-full py-4 bg-orange-600 text-white rounded-2xl font-black shadow-lg">{eid ? '確認更新' : '新增發布'}</button>
                            </div>
                            <div className="space-y-3 max-h-[500px] overflow-y-auto scrollbar-hide pr-2 text-gray-900">
                                {items.map(it => (
                                    <div key={it.id} className="p-4 border rounded-3xl flex justify-between items-center bg-white shadow-sm hover:border-orange-200">
                                        <div><h6 className="font-bold">{it.title || it.name || it.id}</h6><p className="text-xs text-gray-400">{it.date || it.price || it.role}</p></div>
                                        <div className="flex gap-1"><button onClick={()=>{setEid(it.id);setF(it);}} className="p-2 text-blue-400 hover:bg-blue-50 rounded-lg"><Icon name="edit-3" size={16}/></button><button onClick={()=>db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).doc(it.id).delete()} className="p-2 text-red-300 hover:bg-red-50 rounded-lg"><Icon name="trash-2" size={16}/></button></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="max-w-7xl mx-auto px-4 pt-40 pb-20 animate-fadeIn text-gray-900">
                        <div className="bg-white rounded-[3rem] p-10 border shadow-sm mb-12 flex flex-col md:flex-row items-center justify-between gap-8 text-gray-900 text-gray-900">
                            <div className="flex items-center gap-8"><div className="w-24 h-24 bg-orange-100 rounded-[2.5rem] overflow-hidden border-4 border-orange-50 shadow-inner"><img src={user?.photoURL} alt="" /></div><div><h2 className="text-3xl font-black">{user?.displayName}</h2><div className="flex gap-2 mt-2"><span className={`text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-wider ${user?.role === 'admin' ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-400'}`}>{user?.role === 'admin' ? '管理員' : '隊友'}</span></div></div></div>
                            <button onClick={handleLogout} className="flex items-center gap-2 text-red-500 font-bold px-8 py-3 rounded-2xl hover:bg-red-50 border border-red-100 transition-colors"><Icon name="log-out" size={18} /> 登出系統</button>
                        </div>
                        {user?.role === 'admin' && (
                            <div className="mb-12"><h3 className="text-xl font-black mb-6 flex items-center gap-2 text-gray-900"><Icon name="layout-dashboard" className="text-orange-600"/> 管理員控制台</h3><div className="grid grid-cols-2 md:grid-cols-5 gap-4 text-gray-900 text-gray-900">
                                {[
                                    {v:'myEvents', t:'我的報名', i:'clipboard-list'}, {v:'manageEvents', t:'行事曆管理', i:'calendar'}, 
                                    {v:'manageGroupReg', t:'團報管理', i:'users'}, {v:'manageMall', t:'商城產品', i:'package'}, 
                                    {v:'manageMembers', t:'成員權限', i:'user-cog'}
                                ].map(btn => (
                                    <button key={btn.v} onClick={() => setAdminView(btn.v)} className={`flex flex-col items-center justify-center p-6 rounded-[2.5rem] border-2 transition-all ${adminView === btn.v ? 'bg-orange-600 border-orange-600 text-white shadow-lg' : 'bg-white border-gray-100 text-gray-600 hover:border-orange-500'}`}>
                                        <Icon name={btn.i} size={24} className="mb-2" />
                                        <span className="text-xs font-bold">{btn.t}</span>
                                    </button>
                                ))}
                            </div></div>
                        )}
                        <div className="bg-white rounded-[3rem] p-12 border shadow-sm text-gray-900 text-gray-900">
                            {adminView === 'myEvents' && (
                                <div className="animate-fadeIn"><h4 className="text-2xl font-black mb-10 flex items-center gap-3"><Icon name="check-circle-2" className="text-green-500" /> 我已報名的活動</h4><div className="space-y-4">
                                    {myRegs.map(reg => (<div key={reg.id} className="p-8 bg-gray-50 rounded-[2rem] flex justify-between items-center border border-transparent hover:border-orange-100 transition-all"><div><h5 className="font-bold text-xl">{reg.eventTitle}</h5><p className="text-sm text-gray-400 mt-2">{reg.joinedAt?.toDate().toLocaleDateString()}</p></div><button onClick={() => handleCancelJoinAction(reg.id)} className="p-4 text-gray-300 hover:text-red-500 bg-white rounded-2xl shadow-sm"><Icon name="trash-2" size={24}/></button></div>))}
                                    {myRegs.length === 0 && <div className="text-center py-20 text-gray-400 font-black text-xl italic opacity-50 uppercase tracking-widest text-gray-900">目前暫無報名</div>}
                                </div></div>
                            )}
                            {adminView === 'manageEvents' && <ModuleEditor col="events" title="活動" icon="calendar" fields={[{id:'title',label:'活動名稱'},{id:'date',label:'日期 (YYYY-MM-DD)'},{id:'time',label:'時間'},{id:'location',label:'地點'},{id:'officialUrl',label:'官網連結'},{id:'image',label:'圖片URL'}]} />}
                            {adminView === 'manageGroupReg' && <ModuleEditor col="group_registrations" title="團報" icon="users" fields={[{id:'title',label:'賽事名稱'},{id:'address',label:'賽事地點'},{id:'url',label:'Google表單連結'},{id:'officialUrl',label:'官網連結'},{id:'image',label:'圖片URL'}]} />}
                            {adminView === 'manageMall' && <ModuleEditor col="mall" title="商品" icon="package" fields={[{id:'name',label:'商品名稱'},{id:'price',label:'價格 (NT$)'},{id:'img',label:'圖片URL'}]} />}
                            {adminView === 'manageMembers' && <ModuleEditor col="members" title="成員" icon="user-cog" fields={[{id:'id',label:'帳號ID'},{id:'birthday',label:'密碼(生日)'},{id:'name',label:'顯示姓名'},{id:'role',label:'權限 (admin/user)'}]} />}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen text-gray-900">
                    {/* 登入彈窗 */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl relative overflow-hidden text-gray-900">
                                <button onClick={() => setIsLoginModalOpen(false)} className="absolute top-8 right-8 text-gray-400 hover:text-gray-900 transition-colors"><Icon name="x" size={24}/></button>
                                <div className="relative mb-8 text-center"><div className="w-20 h-20 bg-orange-600 rounded-[2rem] flex items-center justify-center mx-auto mb-4 shadow-xl"><img src={LOGO_URL} className="w-12 h-12 object-contain" /></div><h2 className="text-3xl font-black tracking-tighter">隊友登入</h2></div>
                                <form onSubmit={handleLoginSubmit} className="space-y-5 relative">
                                    <div className="space-y-1.5"><label className="text-sm font-bold text-gray-600 ml-1">帳號 ID</label><div className="relative"><Icon name="user" className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400" size={18} /><input type="text" value={loginForm.id || ''} onChange={e=>setLoginForm({...loginForm, id: e.target.value})} className="w-full pl-14 pr-5 py-4 bg-gray-50 border-none rounded-2xl font-bold outline-none text-gray-900" placeholder="ID" /></div></div>
                                    <div className="space-y-1.5"><label className="text-sm font-bold text-gray-600 ml-1">密碼 (生日)</label><div className="relative text-gray-900"><Icon name="key-round" className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400" size={18} /><input type="password" value={loginForm.birthday || ''} onChange={e=>setLoginForm({...loginForm, birthday: e.target.value})} className="w-full pl-14 pr-5 py-4 bg-gray-50 border-none rounded-2xl font-bold outline-none text-gray-900" placeholder="生日" /></div></div>
                                    {loginError && <p className="text-red-500 text-sm font-bold text-center">{loginError}</p>}
                                    <button type="submit" className="w-full bg-orange-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-orange-700 active:scale-[0.98] transition-all mt-6">確認登入</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 訪客彈窗 */}
                    {isGuestModalOpen && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center text-gray-900 text-gray-900">
                                <h2 className="text-2xl font-black mb-6">填寫暱稱報名</h2>
                                <input type="text" value={guestName || ''} onChange={e => setGuestName(e.target.value)} className="w-full px-5 py-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-medium mb-6 text-gray-900" placeholder="您的姓名或暱稱" autoFocus />
                                <div className="flex gap-3"><button onClick={()=>{setIsGuestModalOpen(false);setPendingEvent(null);}} className="flex-1 py-4 bg-gray-100 text-gray-600 font-bold rounded-2xl">取消</button><button onClick={handleGuestSubmit} className="flex-2 py-4 bg-blue-600 text-white font-bold rounded-2xl px-8 shadow-lg text-white">確認 +1</button></div>
                            </div>
                        </div>
                    )}

                    {/* 導覽列 */}
                    <nav className={`fixed top-0 w-full z-[400] transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => handleNavClick('首頁')}>
                                <div className="w-10 h-10 overflow-hidden rounded-xl shadow-lg border-2 border-white/20 bg-white"><img src={LOGO_URL} className="w-full h-full object-cover" /></div>
                                <span className={`text-2xl font-black tracking-tighter ${isDarkText ? 'text-gray-900' : 'text-white'}`}>TRBB</span>
                            </div>
                            <div className="hidden lg:flex gap-8 items-center text-gray-900">
                                {navItems.map((item) => (
                                    <button key={item.name} onClick={() => handleNavClick(item.name)} className={`font-bold text-sm transition-colors ${activeTab === item.name ? 'nav-active' : isDarkText ? 'text-gray-600 hover:text-orange-600' : 'text-white/80 hover:text-white'}`}>{item.name}</button>
                                ))}
                                {user && user.uid !== "anonymous" ? (
                                    <button onClick={() => handleNavClick('個人專區')} className="flex items-center gap-3 ml-4 group text-gray-900 text-gray-900 text-gray-900"><div className="w-10 h-10 rounded-2xl border-2 border-orange-50 overflow-hidden bg-gray-100 group-hover:scale-110 transition-all shadow-md"><img src={user.photoURL} alt="" /></div><span className={`text-sm font-black ${isDarkText ? 'text-gray-900' : 'text-white'}`}>{user.displayName}</span></button>
                                ) : (
                                    <button onClick={() => setIsLoginModalOpen(true)} className="bg-orange-600 text-white px-8 py-2.5 rounded-2xl text-sm font-black transition-all hover:bg-orange-700 shadow-xl shadow-orange-900/20 text-white">登入</button>
                                )}
                            </div>
                            <button className={`lg:hidden p-2 rounded-lg ${isDarkText ? 'text-gray-900' : 'text-white'}`} onClick={() => setIsMenuOpen(!isMenuOpen)}><Icon name={isMenuOpen ? "x" : "menu"} size={28}/></button>
                        </div>
                    </nav>

                    <main>
                        {activeTab === '首頁' && (
                            <div className="animate-fadeIn">
                                <section className="relative h-[100vh] min-h-[600px] flex items-center justify-center overflow-hidden">
                                    <div className="absolute inset-0 bg-black/60 z-10 text-white text-white text-white"></div>
                                    <img src="https://images.unsplash.com/photo-1552674605-db6ffd4facb5?auto=format&fit=crop&q=80&w=2000" className="absolute inset-0 w-full h-full object-cover" alt="" />
                                    <div className="relative z-20 text-center px-4 max-w-4xl text-white pt-44 text-white text-white text-white">
                                        <h1 className="text-7xl md:text-[10rem] font-black mb-10 tracking-tighter leading-none uppercase drop-shadow-2xl">鐵人拔巴<br/><span className="text-orange-500 italic drop-shadow-lg text-orange-500 italic">TRBB</span></h1>
                                        <p className="text-xl md:text-3xl font-light mb-16 opacity-90 max-w-2xl mx-auto leading-relaxed text-white">推廣運動的重要，讓正能量去影響周遭的人。<br/>酸民 Out!</p>
                                        <div className="flex flex-wrap justify-center gap-6"><button onClick={() => handleNavClick('生存戰區')} className="bg-orange-600 hover:bg-orange-700 text-white px-14 py-6 rounded-[2.5rem] font-black text-2xl transition-all shadow-2xl hover:-translate-y-1">了解生存戰</button><button onClick={() => handleNavClick('活動行事曆')} className="bg-white/10 hover:bg-white/20 backdrop-blur-xl text-white border border-white/20 px-14 py-6 rounded-[2.5rem] font-black text-2xl transition-all hover:scale-105">查看行事曆</button></div>
                                    </div>
                                </section>
                            </div>
                        )}
                        {activeTab === '生存戰區' && <SurvivalZone />}
                        {activeTab === '活動行事曆' && <CalendarView />}
                        {activeTab === '個人專區' && <AdminConsole />}
                        {activeTab === '購物商城' && (
                            <div className="max-w-7xl mx-auto px-4 pt-40 pb-20 animate-fadeIn text-gray-900">
                                <h2 className="text-5xl font-black mb-16 tracking-tighter text-gray-900">購物商城</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-12 text-gray-900 text-gray-900 text-gray-900">
                                    {mallProducts.map(item => (
                                        <div key={item.id} className="group cursor-pointer text-gray-900"><div className="relative aspect-square rounded-[3rem] overflow-hidden bg-gray-100 mb-6 shadow-sm border border-gray-50 text-gray-900 text-gray-900"><img src={item.img || PLACEHOLDER_IMAGE} onError={(e)=>e.target.src=PLACEHOLDER_IMAGE} alt="" className="w-full h-full object-cover group-hover:scale-110 transition-all duration-700" /><div className="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors"></div></div><h3 className="font-black group-hover:text-orange-600 transition-colors text-lg text-gray-900 text-gray-900 text-gray-900">{item.name}</h3><p className="text-orange-600 font-black text-xl mt-1 text-gray-900">{item.price}</p></div>
                                    ))}
                                    {mallProducts.length === 0 && <div className="col-span-full py-20 text-center text-gray-400 font-black text-2xl opacity-20 text-gray-900 text-gray-900">目前暫無商品</div>}
                                </div>
                            </div>
                        )}
                        {activeTab === '網頁團報' && (
                            <div className="max-w-7xl mx-auto px-4 pt-40 pb-20 animate-fadeIn text-gray-900">
                                <div className="flex flex-col md:flex-row md:items-center justify-between mb-16 gap-6 text-gray-900">
                                    <div className="text-left text-gray-900 text-gray-900 text-gray-900"><h2 className="text-6xl font-black tracking-tighter text-gray-900">網頁團報</h2><p className="text-gray-400 mt-3 font-medium text-gray-900">加入 TRBB 團報，享有團隊專屬應援！</p></div>
                                    <a href={GLOBAL_REG_LINK} target="_blank" rel="noopener noreferrer" className="bg-orange-600 text-white px-10 py-5 rounded-[2rem] font-black text-xl hover:bg-orange-700 transition-all shadow-2xl flex items-center gap-3 text-white text-white">前往 Google 報名 <Icon name="external-link" size={24}/></a>
                                </div>
                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-12 text-left">
                                    {groupRegEvents.map(event => (
                                        <div key={event.id} className="bg-white rounded-[3.5rem] border border-gray-100 shadow-sm overflow-hidden group hover:shadow-2xl transition-all hover:-translate-y-2 text-gray-900">
                                            <div className="h-56 overflow-hidden text-gray-900 text-gray-900 text-gray-900"><img src={event.image || PLACEHOLDER_IMAGE} onError={(e)=>e.target.src=PLACEHOLDER_IMAGE} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-all duration-700 text-gray-900 text-gray-900" /></div>
                                            <div className="p-10 text-gray-900 text-gray-900 text-gray-900 text-gray-900">
                                                <h3 className="text-3xl font-black mb-3 text-gray-900">{event.title}</h3>
                                                <p className="text-orange-600 text-sm font-black mb-4 uppercase tracking-[0.2em]">{event.category}</p>
                                                <p className="text-gray-400 text-sm mb-10 flex items-center gap-2 font-bold"><Icon name="map-pin" className="text-orange-500" size={18}/> {event.address || '地點未設定'}</p>
                                                <div className="flex flex-col gap-2">
                                                    <a href={event.url} target="_blank" rel="noopener noreferrer" className="w-full bg-black text-white py-5 rounded-[2.5rem] font-black text-lg hover:bg-orange-600 transition-all flex items-center justify-center gap-3 text-white">立即報名 <Icon name="external-link" size={20}/></a>
                                                    {event.officialUrl && <a href={event.officialUrl} target="_blank" rel="noopener noreferrer" className="w-full py-3 rounded-[2.5rem] font-black border-2 border-gray-100 text-gray-400 text-center hover:text-orange-600 transition-all text-sm font-bold">賽事官方網站</a>}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === '2.0會籍專區' && <div className="pt-40 pb-20 text-center text-gray-400 font-black text-4xl uppercase animate-pulse text-gray-900 text-gray-900">2.0 會員專屬內容建置中...</div>}
                    </main>

                    <footer className="bg-gray-900 text-white py-20 mt-0">
                        <div className="max-w-7xl mx-auto px-6 text-center text-white">
                            <div className="inline-flex items-center gap-3 mb-10 text-white"><div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center p-2 shadow-xl"><img src={LOGO_URL} className="w-full h-full object-contain" /></div><span className="text-4xl font-black tracking-tighter text-white">TRBB</span></div>
                            <div className="flex justify-center gap-10 mb-12 text-white"><Icon name="facebook" className="cursor-pointer hover:text-orange-500"/><Icon name="instagram" className="cursor-pointer hover:text-orange-500"/><Icon name="mail" className="cursor-pointer hover:text-orange-500"/></div>
                            <p className="text-gray-500 text-sm font-medium">© 2026 TRBB 鐵人拔巴運動團. 開心運動，回饋社會！</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
